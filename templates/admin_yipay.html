{{template "page_start" .}}

<h1 class="text-xl md:text-2xl font-bold text-gray-900 mb-6">易支付设置</h1>

<div class="bg-white rounded-xl shadow-sm border p-6 max-w-2xl">
	<form method="POST" action="/yipay">
		<div class="mb-4">
			<label class="block text-sm font-medium text-gray-600 mb-1">API 地址</label>
			<input type="text" name="api_url" value="{{.cfg.ApiURL}}" class="w-full border rounded-lg px-3 py-2.5 text-sm" placeholder="https://your.yipay.com">
		</div>
		<div class="mb-4">
			<label class="block text-sm font-medium text-gray-600 mb-1">商户号 (PID)</label>
			<input type="text" name="merchant_id" value="{{.cfg.MerchantID}}" class="w-full border rounded-lg px-3 py-2.5 text-sm">
		</div>
		<div class="mb-4">
			<label class="block text-sm font-medium text-gray-600 mb-1">密钥 (Secret Key)</label>
			<input type="text" name="secret_key" value="{{.cfg.SecretKey}}" class="w-full border rounded-lg px-3 py-2.5 text-sm font-mono">
		</div>
		<div class="mb-6">
			<label class="block text-sm font-medium text-gray-600 mb-2">启用支付方式</label>
			<label class="inline-flex items-center mr-6">
				<input type="checkbox" name="alipay" value="1" {{if .cfg.Alipay}}checked{{end}} class="mr-1">
				<span class="text-sm">支付宝</span>
			</label>
			<label class="inline-flex items-center">
				<input type="checkbox" name="wechatpay" value="1" {{if .cfg.WechatPay}}checked{{end}} class="mr-1">
				<span class="text-sm">微信支付</span>
			</label>
		</div>
		<button class="bg-blue-600 text-white px-6 py-2.5 rounded-lg hover:bg-blue-700 text-sm">保存设置</button>
	</form>
</div>

{{template "page_end"}}
