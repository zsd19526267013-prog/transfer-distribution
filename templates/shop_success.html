<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>购买成功</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-green-50 to-emerald-100 min-h-screen flex items-center">
	<div class="max-w-lg mx-auto px-4 py-12 w-full">
		<div class="bg-white rounded-2xl shadow-lg border p-8 text-center">
			<div class="text-5xl mb-4">✅</div>
			<h1 class="text-xl font-bold text-gray-800">购买成功！</h1>
			<p class="text-gray-500 text-sm mt-1">{{.product.Name}} - 兑换码已生成</p>

			<div class="mt-6 bg-gray-50 rounded-xl border-2 border-dashed border-blue-300 p-4">
				<p class="text-xs text-gray-400 mb-2">请尽快复制兑换码并前往 new-api 兑换</p>
				<div id="codeDisplay" class="text-lg font-mono font-bold text-blue-700 break-all select-all bg-white rounded-lg p-3 border">
					{{formatCodeKey .order.CodeKey}}
				</div>
				<button onclick="copyCode()"
					class="mt-3 bg-blue-600 text-white px-6 py-2.5 rounded-lg font-medium active:bg-blue-700 transition-colors text-sm">
					复制兑换码
				</button>
				<p id="copyTip" class="text-xs text-green-600 mt-2 hidden">已复制到剪贴板</p>
			</div>

			<div class="mt-4 text-xs text-gray-400">
				<p>前往 new-api 登录后，在"兑换码"页面输入上方兑换码即可充值</p>
			</div>

			<form method="GET" action="/buy" class="mt-6">
				<button class="w-full bg-gray-100 text-gray-600 py-3 rounded-xl font-medium active:bg-gray-200 transition-colors text-sm">
					继续购买
				</button>
			</form>
		</div>
	</div>

	<script>
	function copyCode() {
		const code = document.getElementById('codeDisplay').textContent.trim();
		if (navigator.clipboard && navigator.clipboard.writeText) {
			navigator.clipboard.writeText(code).then(() => {
				document.getElementById('copyTip').classList.remove('hidden');
				setTimeout(() => document.getElementById('copyTip').classList.add('hidden'), 2000);
			});
		} else {
			const ta = document.createElement('textarea');
			ta.value = code;
			document.body.appendChild(ta);
			ta.select();
			document.execCommand('copy');
			document.body.removeChild(ta);
			document.getElementById('copyTip').classList.remove('hidden');
			setTimeout(() => document.getElementById('copyTip').classList.add('hidden'), 2000);
		}
	}

	// 自动轮询：如果订单还是 pending，说明支付回调还没到，轮询等待
	(function poll() {
		fetch('/buy/status/{{.order.Id}}')
			.then(r => r.json())
			.then(d => {
				if (d.status !== 'paid') {
					setTimeout(poll, 2000);
				}
			})
			.catch(() => setTimeout(poll, 3000));
	})();
	</script>
</body>
</html>
