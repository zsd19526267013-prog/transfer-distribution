<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>购买成功</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-green-50 to-emerald-100 min-h-screen flex items-center">
	<div class="max-w-lg mx-auto px-4 py-12 w-full">
		<div class="bg-white rounded-2xl shadow-lg border p-8 text-center">
			{{if eq .order.Status "paid"}}
			<div class="text-5xl mb-4">✅</div>
			<h1 class="text-xl font-bold text-gray-800">购买成功！</h1>
			<p class="text-gray-500 text-sm mt-1">{{.product.Name}}</p>

			<div class="mt-6 bg-gray-50 rounded-xl border-2 border-dashed border-blue-300 p-4">
				<p class="text-xs text-gray-400 mb-2">你的兑换码</p>
				<div id="codeDisplay" class="text-lg font-mono font-bold text-blue-700 break-all select-all bg-white rounded-lg p-3 border">
					{{formatCodeKey .codeKey}}
				</div>
				<div class="mt-3 flex gap-2">
					<button onclick="copyCode()"
						class="flex-1 bg-blue-600 text-white px-4 py-2.5 rounded-lg font-medium active:bg-blue-700 transition-colors text-sm">
						复制兑换码
					</button>
					<button onclick="downloadCode()"
						class="flex-1 bg-emerald-600 text-white px-4 py-2.5 rounded-lg font-medium active:bg-emerald-700 transition-colors text-sm">
						下载到手机
					</button>
				</div>
				<p id="copyTip" class="text-xs text-green-600 mt-2 hidden">已复制到剪贴板</p>
			</div>

			<div class="mt-4 text-xs text-gray-400">
				<p>请妥善保管兑换码，可在本页面随时查看和下载</p>
				<p class="mt-1">订单号: <span class="font-mono">{{.order.OutTradeNo}}</span></p>
			</div>

			<div class="mt-6 flex flex-col gap-3">
				<a href="/buy"
					class="block w-full bg-gray-100 text-gray-600 py-3 rounded-xl font-medium text-center active:bg-gray-200 transition-colors text-sm">
					继续购买
				</a>
			</div>
			{{else if eq .order.Status "pending"}}
			<div class="text-5xl mb-4">⏳</div>
			<h1 class="text-xl font-bold text-gray-800">支付确认中...</h1>
			<p class="text-gray-500 text-sm mt-1">系统正在确认你的支付结果，请稍候</p>
			<div class="mt-8 flex justify-center">
				<div class="w-8 h-8 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin"></div>
			</div>
			{{else}}
			<div class="text-5xl mb-4">❌</div>
			<h1 class="text-xl font-bold text-gray-800">订单异常</h1>
			<p class="text-gray-500 text-sm mt-1">该订单状态异常，请联系客服</p>
			<div class="mt-6">
				<a href="/buy"
					class="block w-full bg-blue-600 text-white py-3 rounded-xl font-medium text-center text-sm">
					返回购买
				</a>
			</div>
			{{end}}
		</div>
	</div>

	<script>
	function copyCode() {
		const code = document.getElementById('codeDisplay').textContent.trim();
		if (navigator.clipboard && navigator.clipboard.writeText) {
			navigator.clipboard.writeText(code).then(() => {
				document.getElementById('copyTip').classList.remove('hidden');
				setTimeout(() => document.getElementById('copyTip').classList.add('hidden'), 2000);
			});
		} else {
			const ta = document.createElement('textarea');
			ta.value = code;
			document.body.appendChild(ta);
			ta.select();
			document.execCommand('copy');
			document.body.removeChild(ta);
			document.getElementById('copyTip').classList.remove('hidden');
			setTimeout(() => document.getElementById('copyTip').classList.add('hidden'), 2000);
		}
	}

	function downloadCode() {
		const code = document.getElementById('codeDisplay').textContent.trim();
		const blob = new Blob([code], { type: 'text/plain;charset=utf-8' });
		const url = URL.createObjectURL(blob);
		const a = document.createElement('a');
		a.href = url;
		a.download = 'redeem_code.txt';
		document.body.appendChild(a);
		a.click();
		document.body.removeChild(a);
		URL.revokeObjectURL(url);
	}

	{{if eq .order.Status "pending"}}
	// 轮询等待支付结果
	(function poll() {
		fetch('/buy/status/{{.order.Id}}')
			.then(r => r.json())
			.then(d => {
				if (d.status === 'paid' && d.code_key) {
					location.reload();
				} else if (d.status === 'pending') {
					setTimeout(poll, 2000);
				}
			})
			.catch(() => setTimeout(poll, 3000));
	})();
	{{end}}
	</script>
</body>
</html>
