{{template "page_start" .}}

<div class="max-w-md mx-auto">

	<style>
		body > nav a[href="/"] { display: none; }
		body > nav { justify-content: center !important; }
		body > nav span { display: none !important; }
		.logout-form { display: none !important; }
		body { background: linear-gradient(180deg, #fefce8 0%, #f0fdf4 50%, #ecfdf5 100%); }
	</style>

	<!-- 头部 -->
	<div class="text-center mb-8 pt-6">
		<div class="relative inline-flex mb-5">
			<div class="absolute inset-0 bg-gradient-to-br from-amber-400 to-emerald-500 rounded-full blur-xl opacity-30 scale-150"></div>
			<div class="relative w-20 h-20 bg-gradient-to-br from-amber-400 via-yellow-500 to-emerald-600 rounded-full flex items-center justify-center shadow-lg shadow-amber-200/50 ring-4 ring-white">
				<svg class="w-10 h-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
			</div>
		</div>
		<h1 class="text-2xl font-bold text-gray-800">{{.d.Name}}</h1>
		<p class="text-sm text-gray-400 mt-1">收益看板</p>
	</div>

	<!-- 累计收益 -->
	<div class="relative rounded-3xl p-7 mb-7 text-white overflow-hidden shadow-xl"
		style="background: linear-gradient(135deg, #064e3b 0%, #065f46 25%, #047857 50%, #059669 75%, #10b981 100%);">
		<div class="absolute -top-10 -right-10 w-40 h-40 bg-yellow-300/20 rounded-full blur-3xl"></div>
		<div class="absolute -bottom-10 -left-10 w-40 h-40 bg-emerald-300/20 rounded-full blur-3xl"></div>
		<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-60 h-60 bg-white/5 rounded-full blur-2xl"></div>

		<div class="relative flex items-center gap-1.5 mb-5">
			<div class="w-1.5 h-1.5 rounded-full bg-yellow-400/80"></div>
			<div class="w-1.5 h-1.5 rounded-full bg-yellow-400/60"></div>
			<div class="w-1.5 h-1.5 rounded-full bg-yellow-400/40"></div>
			<span class="ml-2 text-xs font-medium text-emerald-200/80 tracking-wider uppercase">累计收益</span>
		</div>

		<div class="relative">
			<p class="text-6xl md:text-7xl font-bold font-mono tracking-tight text-white drop-shadow-lg">
				{{.totalCommission}}
			</p>
			<div class="flex items-center gap-3 mt-3">
				<span class="px-2.5 py-1 bg-white/15 backdrop-blur-sm rounded-full text-xs font-medium text-emerald-100">30% 佣金</span>
				<span class="text-emerald-200/50">·</span>
				<span class="text-sm text-emerald-200/80">{{.redeemedCodes}} 个码核销</span>
			</div>
		</div>

		<div class="relative mt-5 pt-4 border-t border-white/15">
			<p class="text-sm font-medium text-emerald-100/90">
				{{if gt .totalCommission 0}}
				继续推广，收益节节高
				{{else}}
				分享兑换码，开启收益之旅
				{{end}}
			</p>
		</div>
	</div>

	<!-- 统计卡片 -->
	<div class="grid grid-cols-3 gap-3 mb-7">
		<div class="bg-white/80 backdrop-blur-sm rounded-2xl border border-emerald-100/60 p-4 text-center shadow-sm shadow-emerald-50">
			<div class="w-8 h-8 bg-gradient-to-br from-green-400 to-emerald-500 rounded-xl flex items-center justify-center mx-auto mb-2 shadow-sm">
				<svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
			</div>
			<p class="text-xl font-bold text-gray-800 font-mono">{{.redeemedCodes}}</p>
			<p class="text-xs text-gray-400 mt-0.5">已核销</p>
		</div>
		<div class="bg-white/80 backdrop-blur-sm rounded-2xl border border-blue-100/60 p-4 text-center shadow-sm shadow-blue-50">
			<div class="w-8 h-8 bg-gradient-to-br from-blue-400 to-indigo-500 rounded-xl flex items-center justify-center mx-auto mb-2 shadow-sm">
				<svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197m13.5-9a2.5 2.5 0 11-5 0 2.5 2.5 0 015 0z"/></svg>
			</div>
			<p class="text-xl font-bold text-gray-800 font-mono">{{.uniqueUsers}}</p>
			<p class="text-xs text-gray-400 mt-0.5">用户数</p>
		</div>
		<div class="bg-white/80 backdrop-blur-sm rounded-2xl border border-purple-100/60 p-4 text-center shadow-sm shadow-purple-50">
			<div class="w-8 h-8 bg-gradient-to-br from-purple-400 to-pink-500 rounded-xl flex items-center justify-center mx-auto mb-2 shadow-sm">
				<svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"/></svg>
			</div>
			<p class="text-xl font-bold text-gray-800 font-mono">{{.totalCodes}}</p>
			<p class="text-xs text-gray-400 mt-0.5">总码数</p>
		</div>
	</div>

	<div class="h-8"></div>

	<a href="/dist/{{.d.Key}}/shop"
		class="block bg-gradient-to-r from-blue-600 to-indigo-600 text-white text-center py-4 rounded-2xl font-bold shadow-lg shadow-blue-200 mb-6 active:scale-[0.98] transition-transform">
		+ 购买兑换码
	</a>

	<div class="h-8"></div>
</div>

{{template "page_end" .}}
