{{template "page_start" .}}

<div class="mb-3">
	<a href="/" class="text-blue-600 hover:text-blue-800 text-sm">&larr; 返回看板</a>
</div>

<div class="bg-white rounded-xl shadow-sm border p-4">
	<form method="POST" action="/distributor/{{.distributor.Id}}/import">
		<div class="mb-3">
			<label class="block text-sm font-medium text-gray-700 mb-1">为 <strong>{{.distributor.Name}}</strong> 导入兑换码</label>
			<p class="text-xs text-gray-400 mb-2">每行一个32位兑换码，粘贴后点击导入</p>
			<textarea name="codes" rows="12" class="w-full border rounded-lg px-3 py-2.5 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="每行一个兑换码..."></textarea>
		</div>
		<button class="w-full md:w-auto bg-blue-600 text-white px-6 py-3 md:py-2 rounded-lg hover:bg-blue-700 text-sm active:bg-blue-800">导入</button>
	</form>
	{{if .msg}}
	<div class="mt-3 p-3 bg-green-50 text-green-700 rounded-lg text-sm">{{.msg}}</div>
	{{end}}
</div>

{{template "page_end" .}}
