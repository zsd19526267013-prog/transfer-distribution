name: Build & Deploy

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        run: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o distribution .

      - name: Push binary to release branch
        run: |
          git config user.name "CI"
          git config user.email "ci@coracode.com"
          git checkout -b release
          git add -f distribution
          git commit -m "deploy $(date +%Y%m%d-%H%M%S)"
          git push origin release --force
