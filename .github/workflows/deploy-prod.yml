name: Deploy to PROD

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        run: |
          CGO_ENABLED=0 go build -o distribution .

      - name: Upload binary (temp name)
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: "distribution"
          target: "/www/wwwroot/distribution/"
          rm: true

      - name: Swap binary & restart via PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd /www/wwwroot/distribution
            chmod +x distribution
            pm2 restart distribution --update-env
            sleep 2
            pm2 status distribution
            echo "✅ 部署完成"
